version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: contazap-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/data
      - ./config.json:/app/config.json:ro
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - contazap-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: contazap-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - contazap-net

volumes:
  sqlite-data:
    driver: local

networks:
  contazap-net:
    driver: bridge
