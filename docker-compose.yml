services:
  # ── API Gateway ────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - PROJECT_NAME=Api
    container_name: contazap-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
      - sqlite-data:/app/data
      - ./logs:/app/logs
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - NATS_URL=nats://nats:4222
      # - TEST=1
      - Database__ConnectionString=Data Source=/app/data/secondbrain.db
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contazap-net

  # ── Message Worker ─────────────────────────────────────
  message-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - PROJECT_NAME=MessageWorker
    container_name: message-worker
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      # - TEST=1
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - contazap-net

  # ── Persistence Worker ────────────────────────────────
  persistence-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - PROJECT_NAME=PersistenceWorker
    container_name: persistence-worker
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      # - TEST=1

    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - contazap-net

  # ── NATS JetStream ────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: contazap-nats
    command: [ "-c", "/etc/nats/nats-server.conf" ]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/jetstream
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - contazap-net

  # ── DynamoDB Local ────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: [ "-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory" ]
    networks:
      - contazap-net

  # ── DynamoDB Init ─────────────────────────────────────
  dynamodb-init:
    image: amazon/aws-cli
    depends_on:
      - dynamodb-local
    volumes:
      - ./infra/dynamodb/init-dynamo.sh:/init.sh
    entrypoint: [ "/bin/bash", "/init.sh" ]
    networks:
      - contazap-net

  # ── Redis (Cache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
    networks:
      - contazap-net

  # ── Client ────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: contazap-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - contazap-net

volumes:
  nats-data:
  sqlite-data:

networks:
  contazap-net:
    driver: bridge
